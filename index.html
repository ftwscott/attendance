<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Command v7.0 Mobile</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #090c10;
            --card: #161b22;
            --border: #30363d;
            --accent: #2f81f7;
            --danger: #f85149;
            --success: #2ea043;
            --warning: #d29922;
            --text-main: #f0f6fc;
            --text-sub: #8b949e;
            --glass: rgba(22, 27, 34, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            padding-bottom: 80px; /* Space for bottom nav/buttons */
        }

        /* --- Header & Profile --- */
        .app-header {
            padding: 20px 20px 10px 20px;
            background: linear-gradient(180deg, rgba(22,27,34,1) 0%, rgba(9,12,16,0) 100%);
        }

        .profile-card {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 0 15px rgba(47, 129, 247, 0.4);
        }

        .user-info h2 { margin: 0; font-size: 1.1rem; }
        .user-info p { margin: 2px 0 0; font-size: 0.8rem; color: var(--text-sub); font-family: monospace; }

        /* --- Global Stats Circle --- */
        .dashboard-hero {
            text-align: center;
            padding: 20px 0;
        }

        .pct-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 8px solid var(--card);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            position: relative;
            background: radial-gradient(circle, #1c2128 0%, #0d1117 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .pct-label { font-size: 0.7rem; color: var(--text-sub); font-weight: normal; margin-top: -5px; }

        /* --- Navigation Grid --- */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px;
            margin-top: 20px;
        }

        .menu-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
        }

        .menu-card:active { transform: scale(0.96); }
        .menu-card i { font-size: 1.5rem; margin-bottom: 10px; display: block; }
        .menu-card span { font-size: 0.9rem; font-weight: 600; }

        /* --- Sections (Hidden by default) --- */
        .view-section {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .view-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Timetable List --- */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
        }

        .day-header {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .class-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .class-info h3 { margin: 0; font-size: 1rem; }
        .class-info p { margin: 4px 0 0; font-size: 0.75rem; color: var(--text-sub); }

        .action-group { display: flex; gap: 8px; }

        .btn-check {
            width: 40px; height: 40px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-p { background: rgba(46, 160, 67, 0.15); color: var(--success); border: 1px solid rgba(46, 160, 67, 0.3); }
        .btn-p:active { background: var(--success); color: white; }
        
        .btn-a { background: rgba(248, 81, 73, 0.15); color: var(--danger); border: 1px solid rgba(248, 81, 73, 0.3); }
        .btn-a:active { background: var(--danger); color: white; }

        /* --- Analytics List --- */
        .stat-row {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .stat-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .stat-bar-bg { height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; }
        .stat-bar-fill { height: 100%; transition: width 0.5s; }
        
        .badge-container { display: flex; gap: 10px; margin-top: 10px; }
        .badge { 
            font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; 
            background: rgba(139, 148, 158, 0.1); color: var(--text-sub); 
        }
        .b-warn { color: var(--warning); border: 1px solid rgba(210, 153, 34, 0.3); }
        .b-safe { color: var(--accent); border: 1px solid rgba(88, 166, 255, 0.3); }

        /* --- Save Button --- */
        .save-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
        }

        .btn-save {
            width: 100%;
            background: var(--success);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            box-shadow: 0 5px 20px rgba(46, 160, 67, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .btn-save:active { transform: scale(0.98); }

        /* --- Settings Inputs --- */
        select, button.reset-btn {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        
        .reset-btn { border-color: var(--danger); color: var(--danger); background: transparent; }

    </style>
</head>
<body>

    <div id="view-home" class="view-section active">
        <div class="app-header">
            <div class="profile-card">
                <div class="avatar">V</div>
                <div class="user-info">
                    <h2>Vivek / User</h2>
                    <p>20221cbd0001</p>
                </div>
            </div>
        </div>

        <div class="dashboard-hero">
            <div class="pct-circle" id="global-circle" style="border-color: var(--accent)">
                <span id="home-pct">--%</span>
                <span class="pct-label">AGGREGATE</span>
            </div>
            <div style="margin-top: 15px; font-size: 0.9rem; opacity: 0.7;" id="current-day-display">
                Wednesday
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-card" onclick="navTo('today')" style="border-color: var(--accent);">
                <i class="fas fa-calendar-day" style="color: var(--accent)"></i>
                <span>Log Today</span>
            </div>
            <div class="menu-card" onclick="navTo('timetable')">
                <i class="fas fa-list"></i>
                <span>Full Week</span>
            </div>
            <div class="menu-card" onclick="navTo('analytics')">
                <i class="fas fa-chart-pie" style="color: var(--warning)"></i>
                <span>Bunk Calc</span>
            </div>
            <div class="menu-card" onclick="navTo('settings')">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </div>
        </div>
        
        <div style="padding: 20px;">
            <div class="day-header">TODAY'S STATUS</div>
            <div id="today-preview" style="text-align:center; color: var(--text-sub); font-size: 0.9rem;">
                </div>
        </div>
    </div>

    <div id="view-today" class="view-section">
        <div class="section-header">
            <button class="back-btn" onclick="navTo('home')"><i class="fas fa-arrow-left"></i></button>
            <h2 style="margin:0">Log Attendance</h2>
        </div>
        <p style="opacity: 0.6; font-size: 0.9rem; margin-bottom: 20px;">Tap P or B to update instantly.</p>
        <div id="today-list"></div>
        <div style="height: 60px;"></div> </div>

    <div id="view-timetable" class="view-section">
        <div class="section-header">
            <button class="back-btn" onclick="navTo('home')"><i class="fas fa-arrow-left"></i></button>
            <h2 style="margin:0">Weekly Schedule</h2>
        </div>
        <div id="full-timetable-list"></div>
    </div>

    <div id="view-analytics" class="view-section">
        <div class="section-header">
            <button class="back-btn" onclick="navTo('home')"><i class="fas fa-arrow-left"></i></button>
            <h2 style="margin:0">Analytics</h2>
        </div>
        <div id="inventory-list"></div>
    </div>

    <div id="view-settings" class="view-section">
        <div class="section-header">
            <button class="back-btn" onclick="navTo('home')"><i class="fas fa-arrow-left"></i></button>
            <h2 style="margin:0">Settings</h2>
        </div>

        <div style="background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
            <h3 style="margin-top:0; font-size:1rem;">Saturday Schedule</h3>
            <p style="font-size:0.8rem; color: var(--text-sub);">Select which day Saturday follows:</p>
            <select id="sat-selector" onchange="updateSatSetting()">
                <option value="">No Class</option>
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
            </select>
        </div>

        <div style="margin-top: 20px;">
            <button class="reset-btn" onclick="hardReset()">⚠ Factory Reset Data</button>
        </div>
    </div>

    <div class="save-bar" id="save-btn-container" style="display:none">
        <button class="btn-save" onclick="endOfDaySync()">
            <i class="fas fa-check-circle"></i> Mark End of Day (4:15 PM)
        </button>
    </div>

    <script>
        // --- DATA CONFIGURATION ---
        const INITIAL_COURSES = {
            "APT4026": { name: "Aptitude", ah: 8, th: 14 },
            "CAI2500": { name: "Machine Learning (T)", ah: 4, th: 18 },
            "CAI2501": { name: "Machine Learning (L)", ah: 15, th: 25 },
            "CBD2510": { name: "No SQL (T)", ah: 4, th: 19 },
            "CBD2511": { name: "No SQL (L)", ah: 8, th: 14 },
            "CSE2258": { name: "Web Tech (T)", ah: 9, th: 19 },
            "CSE2259": { name: "Web Tech (L)", ah: 12, th: 14 },
            "CSE2274": { name: "Comp Programming", ah: 11, th: 24 },
            "CSE3426": { name: "Front-End Full Stack", ah: 11, th: 23 },
            "ECE3097": { name: "Smart Electronics", ah: 9, th: 19 },
            "LAW7601": { name: "Indian Constitution", ah: 2, th: 4 }
        };

        const BASE_SCHEDULE = {
            "Monday": ["CAI2500", "CBD2510", "CSE2274", "CSE2274", "CSE2258", "CSE3426", "ECE3097"],
            "Tuesday": ["CAI2500", "CSE2258", "CSE3426", "CBD2510", "CAI2500", "ECE3097"],
            "Wednesday": ["CSE2274", "CSE2274", "CAI2501", "CAI2501", "LAW7601", "CSE3426", "CSE3426"],
            "Thursday": ["CBD2510", "APT4026", "APT4026", "CAI2501", "CAI2501", "ECE3097"],
            "Friday": ["CBD2511", "CBD2511", "CSE2259", "CSE2259", "CSE2259", "CSE2259", "CSE2258"],
            "Saturday": []
        };

        const DAYS = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

        // --- STATE MANAGEMENT ---
        let courses = JSON.parse(localStorage.getItem('cmd_v7_data')) || INITIAL_COURSES;
        let satMode = localStorage.getItem('cmd_v7_sat') || "";

        // --- CORE FUNCTIONS ---

        function saveData() {
            localStorage.setItem('cmd_v7_data', JSON.stringify(courses));
            localStorage.setItem('cmd_v7_sat', satMode);
            refreshAll();
        }

        function getSchedule(dayName) {
            if (dayName === "Saturday") {
                return satMode ? BASE_SCHEDULE[satMode] : [];
            }
            return BASE_SCHEDULE[dayName] || [];
        }

        function updateSatSetting() {
            satMode = document.getElementById('sat-selector').value;
            saveData();
            alert("Saturday schedule updated.");
        }

        function hardReset() {
            if(confirm("Confirm Factory Reset? All logs will be lost.")) {
                courses = JSON.parse(JSON.stringify(INITIAL_COURSES));
                satMode = "";
                saveData();
                location.reload();
            }
        }

        function endOfDaySync() {
            // In a real app, this might push to a server.
            // Here, we provide visual feedback and ensure local save.
            saveData();
            const btn = document.querySelector('.btn-save');
            const originalHTML = btn.innerHTML;
            
            btn.style.background = "#fff";
            btn.style.color = "#2ea043";
            btn.innerHTML = `<i class="fas fa-check-double"></i> Synced Successfully`;
            
            setTimeout(() => {
                btn.style.background = "var(--success)";
                btn.style.color = "white";
                btn.innerHTML = originalHTML;
                navTo('home');
            }, 1500);
        }

        function logClass(code, present) {
            courses[code].th++;
            if (present) courses[code].ah++;
            saveData();
        }

        // --- RENDERERS ---

        function getTodayName() {
            const d = new Date();
            return DAYS[d.getDay()];
        }

        function renderGlobalStats() {
            let totalAh = 0, totalTh = 0;
            Object.values(courses).forEach(c => { totalAh += c.ah; totalTh += c.th; });
            const pct = totalTh === 0 ? 0 : (totalAh / totalTh) * 100;
            
            const circle = document.getElementById('global-circle');
            const txt = document.getElementById('home-pct');
            
            txt.innerText = pct.toFixed(1) + "%";
            circle.style.borderColor = pct >= 75 ? 'var(--success)' : 'var(--danger)';
            circle.style.color = pct >= 75 ? 'var(--success)' : 'var(--danger)';
            
            document.getElementById('current-day-display').innerText = getTodayName() + " | Local Sync";
        }

        function renderClassList(day, containerId, interactive = true) {
            const container = document.getElementById(containerId);
            const classes = getSchedule(day);
            container.innerHTML = "";

            if (classes.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:30px; opacity:0.5">No classes scheduled for ${day}.</div>`;
                return;
            }

            classes.forEach(code => {
                const c = courses[code];
                const div = document.createElement('div');
                div.className = 'class-item';
                
                let buttons = '';
                if(interactive) {
                    buttons = `
                        <div class="action-group">
                            <button class="btn-check btn-p" onclick="logClass('${code}', true)">P</button>
                            <button class="btn-check btn-a" onclick="logClass('${code}', false)">B</button>
                        </div>
                    `;
                } else {
                    buttons = `<span style="font-size:0.8rem; opacity:0.5">${code}</span>`;
                }

                div.innerHTML = `
                    <div class="class-info">
                        <h3>${c.name}</h3>
                        <p>Current: ${c.ah}/${c.th} (${((c.ah/c.th)*100).toFixed(0)}%)</p>
                    </div>
                    ${buttons}
                `;
                container.appendChild(div);
            });
        }

        function renderFullWeek() {
            const container = document.getElementById('full-timetable-list');
            container.innerHTML = "";
            
            ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"].forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.className = "day-header";
                dayHeader.style.marginTop = "20px";
                dayHeader.innerText = day;
                container.appendChild(dayHeader);
                
                const listDiv = document.createElement('div');
                listDiv.id = `tt-${day}`;
                container.appendChild(listDiv);
                
                renderClassList(day, `tt-${day}`, false);
            });
        }

        function renderAnalytics() {
            const container = document.getElementById('inventory-list');
            container.innerHTML = "";

            Object.entries(courses).forEach(([code, data]) => {
                const pct = (data.ah / data.th) * 100;
                const isSafe = pct >= 75;
                
                // Bunk Calc logic
                let badgeHtml = "";
                if(isSafe) {
                    // How many can I bunk?
                    // (ah) / (th + x) >= 0.75
                    const possibleBunks = Math.floor((data.ah - 0.75 * data.th) / 0.75);
                    badgeHtml = `<div class="badge b-safe">Bunk Budget: ${possibleBunks}</div>`;
                } else {
                    // How many need to attend?
                    // (ah + x) / (th + x) >= 0.75
                    const needed = Math.ceil((0.75 * data.th - data.ah) / 0.25);
                    badgeHtml = `<div class="badge b-warn">Catch Up: ${needed} Classes</div>`;
                }

                const div = document.createElement('div');
                div.className = 'stat-row';
                div.innerHTML = `
                    <div class="stat-top">
                        <span style="font-weight:bold">${data.name}</span>
                        <span style="font-weight:bold; color: ${isSafe ? 'var(--success)' : 'var(--danger)'}">${pct.toFixed(1)}%</span>
                    </div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill" style="width: ${Math.min(pct, 100)}%; background: ${isSafe ? 'var(--success)' : 'var(--danger)'}"></div>
                    </div>
                    <div class="badge-container">
                        <div class="badge">${data.ah}/${data.th}</div>
                        ${badgeHtml}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderHomePreview() {
            const today = getTodayName();
            const classes = getSchedule(today);
            const container = document.getElementById('today-preview');
            
            if(classes.length === 0) {
                container.innerHTML = "No classes today. Enjoy!";
            } else {
                container.innerHTML = `${classes.length} Sessions Scheduled`;
            }
        }

        // --- NAVIGATION ---
        function navTo(viewId) {
            // Hide all
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            
            // Show Target
            const target = document.getElementById(`view-${viewId}`);
            if(target) target.classList.add('active');

            // Logic hooks
            if(viewId === 'home') {
                renderGlobalStats();
                renderHomePreview();
                document.getElementById('save-btn-container').style.display = 'none';
            } else if (viewId === 'today') {
                renderClassList(getTodayName(), 'today-list');
                document.getElementById('save-btn-container').style.display = 'block';
            } else if (viewId === 'timetable') {
                renderFullWeek();
                document.getElementById('save-btn-container').style.display = 'none';
            } else if (viewId === 'analytics') {
                renderAnalytics();
                document.getElementById('save-btn-container').style.display = 'none';
            }
        }

        function refreshAll() {
            // Update current view content without changing view
            renderGlobalStats();
            document.getElementById('sat-selector').value = satMode;
            if(document.getElementById('view-today').classList.contains('active')) renderClassList(getTodayName(), 'today-list');
            if(document.getElementById('view-analytics').classList.contains('active')) renderAnalytics();
            if(document.getElementById('view-home').classList.contains('active')) renderHomePreview();
        }

        // --- INIT ---
        document.getElementById('sat-selector').value = satMode;
        renderGlobalStats();
        renderHomePreview();

    </script>
</body>
</html>
