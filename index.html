<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <title>Attendance Command</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <style>
        :root {
            --bg: #ffffff;
            --surface: #f9f9f9;
            --border: #e5e5ea;
            --accent: #FF6B00; /* Orange */
            --accent-soft: #fff0e0;
            --text-main: #1c1c1e;
            --text-sub: #8e8e93;
            --danger: #ff3b30;
            --success: #34c759;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body {
            margin: 0; background: var(--bg); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            height: 100vh; display: flex; flex-direction: column;
        }

        .hidden { display: none !important; }
        .btn { cursor: pointer; transition: transform 0.1s; }
        .btn:active { transform: scale(0.96); }

        /* --- SCREENS --- */
        #setup-screen, #app-screen { flex: 1; display: flex; flex-direction: column; width: 100%; overflow: hidden; }

        /* --- SETUP --- */
        #setup-screen { align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .welcome-icon { font-size: 3.5rem; color: var(--accent); margin-bottom: 20px; }
        .welcome-title { font-size: 2rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px; }
        .upload-btn {
            background: var(--text-main); color: white; padding: 18px 32px; border-radius: 16px;
            font-weight: 700; font-size: 1rem; border: none; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-top: 30px;
        }
        #file-input { display: none; }

        /* --- HEADER --- */
        .header {
            padding: 50px 24px 15px; background: #ffffff; border-bottom: 1px solid var(--border);
        }
        .college-name { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .user-name { font-size: 1.5rem; font-weight: 800; line-height: 1.2; }
        .user-meta { font-size: 0.85rem; color: var(--text-sub); margin-top: 2px; font-family: monospace; }
        
        /* --- TABS --- */
        .tabs { display: flex; padding: 10px 24px; gap: 10px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .tab-btn {
            flex: 1; padding: 10px; border-radius: 10px; background: #fff; border: 1px solid var(--border);
            text-align: center; font-weight: 700; font-size: 0.85rem; color: var(--text-sub);
        }
        .tab-btn.active { background: var(--text-main); color: #fff; border-color: var(--text-main); }

        /* --- CONTENT --- */
        .content { flex: 1; overflow-y: auto; padding: 20px 24px 80px; }

        /* --- CARDS --- */
        .card {
            background: #fff; border: 1px solid var(--border); border-radius: 18px; padding: 18px;
            margin-bottom: 12px; box-shadow: var(--shadow);
        }
        .c-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .c-code { font-size: 1rem; font-weight: 800; }
        .c-pct { font-size: 1.1rem; font-weight: 900; }
        .c-name { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .progress-track { width: 100%; height: 6px; background: #f0f0f0; border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
        .progress-fill { height: 100%; border-radius: 4px; }
        
        .action-row { display: flex; gap: 8px; }
        .act-btn { flex: 1; padding: 8px; border-radius: 8px; font-weight: 700; font-size: 0.8rem; border: none; }
        .act-p { background: rgba(52, 199, 89, 0.1); color: var(--success); }
        .act-a { background: rgba(255, 59, 48, 0.1); color: var(--danger); }

        /* --- CONSOLIDATED VIEW --- */
        .filter-row { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .filter-chip { 
            padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; 
            background: #eee; color: var(--text-sub); border: none; white-space: nowrap;
        }
        .filter-chip.active { background: var(--accent); color: white; }

        .log-group { margin-bottom: 20px; }
        .log-date { font-size: 0.8rem; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; }
        .log-item { display: flex; justify-content: space-between; padding: 10px; background: #fff; border-bottom: 1px solid var(--border); }
        .log-item:last-child { border-bottom: none; }
        .log-status { font-weight: 800; font-size: 0.8rem; }
        .s-p { color: var(--success); }
        .s-a { color: var(--danger); }

        /* --- LOADER --- */
        #loader {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.98);
            z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-text" style="margin-top:20px; font-weight:800; color:var(--text-main);">Processing...</p>
        <p style="font-size:0.8rem; color:var(--text-sub); margin-top:5px;">OCR can take a moment for images</p>
    </div>

    <div id="setup-screen">
        <div class="welcome-icon"><i class="fas fa-eye"></i></div>
        <h1 class="welcome-title">Attendance OCR</h1>
        <p style="color:var(--text-sub); max-width: 300px; line-height: 1.5;">
            Upload your college report (PDF or Excel). <br>We scan for College Name, Courses, and Stats automatically.
        </p>
        <label for="file-input" class="upload-btn btn">
            <i class="fas fa-upload"></i> Upload & Scan
        </label>
        <input type="file" id="file-input" accept=".xlsx, .xls, .pdf" onchange="handleFile(this)">
    </div>

    <div id="app-screen" class="hidden">
        <div class="header">
            <div class="college-name" id="disp-college">DETECTING COLLEGE...</div>
            <div style="display:flex; justify-content:space-between; align-items:end;">
                <div>
                    <div class="user-name" id="disp-name">Student</div>
                    <div class="user-meta" id="disp-roll">--</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:1.5rem; font-weight:900;" id="disp-global">--%</div>
                    <div style="font-size:0.7rem; color:var(--text-sub);">OVERALL</div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab-btn active btn" onclick="switchTab('insights')" id="t-insights">Insights</div>
            <div class="tab-btn btn" onclick="switchTab('consolidated')" id="t-consolidated">Consolidated</div>
            <div class="tab-btn btn" onclick="switchTab('log')" id="t-log">Action</div>
        </div>

        <div class="content" id="content-area">
            </div>
    </div>

    <script>
        // --- DATA MODEL ---
        let appData = {
            courses: {},
            history: [], // { date: timestamp, code: string, status: 'P'|'A', day: 'Mon' }
            profile: { name: "Student", roll: "N/A", college: "My College" }
        };
        let currentTab = 'insights';
        let viewFilter = 'daily'; // daily, weekly, monthly

        window.onload = () => {
            const stored = localStorage.getItem('ocr_data_v1');
            if(stored) { appData = JSON.parse(stored); showApp(); }
        };

        // --- NAVIGATION ---
        function showApp() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            renderUI();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t-'+tab).classList.add('active');
            renderUI();
        }

        function setFilter(filter) {
            viewFilter = filter;
            renderUI();
        }

        function reset() {
            if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); }
        }

        // --- PARSING ---
        function handleFile(input) {
            const file = input.files[0];
            if(!file) return;
            document.getElementById('loader').style.display = 'flex';
            
            const ext = file.name.split('.').pop().toLowerCase();
            if(ext === 'pdf') parsePDF(file);
            else if(ext.includes('xls')) parseExcel(file);
            else { alert("Invalid file"); document.getElementById('loader').style.display = 'none'; }
        }

        async function parsePDF(file) {
            try {
                const buffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(buffer).promise;
                let fullText = "";

                // Try Text Extraction first
                for(let i=1; i<=Math.min(pdf.numPages, 3); i++) {
                    const page = await pdf.getPage(i);
                    const txt = await page.getTextContent();
                    fullText += txt.items.map(s => s.str).join(" ") + " ";
                }

                // If text is sparse, use OCR
                if(fullText.length < 50) {
                    document.getElementById('loader-text').innerText = "Scanning Image (OCR)...";
                    fullText = await performOCR(pdf);
                }

                processText(fullText);

            } catch(e) { console.error(e); alert("PDF Error"); document.getElementById('loader').style.display='none'; }
        }

        async function performOCR(pdf) {
            // Render Page 1 to canvas for Tesseract
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 2.0 });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            return text;
        }

        function parseExcel(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const wb = XLSX.read(e.target.result, {type:'array'});
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const text = XLSX.utils.sheet_to_csv(sheet);
                processText(text);
            };
            reader.readAsArrayBuffer(file);
        }

        function processText(text) {
            // 1. College Name (Regex look for keywords near top)
            // Look for first line with College/University
            const collegeMatch = text.match(/(?:University|College|Institute|Academy|School|Campus) [a-zA-Z\s\&]+/i);
            if(collegeMatch) appData.profile.college = collegeMatch[0].trim();

            // 2. Name & Roll
            const nameMatch = text.match(/(?:Name|Student)\s*[:\-]?\s*([A-Za-z\s\.]+)/i);
            if(nameMatch) appData.profile.name = nameMatch[1].trim().substring(0, 20);
            
            const rollMatch = text.match(/[0-9]{5,}[A-Z0-9]*/);
            if(rollMatch) appData.profile.roll = rollMatch[0];

            // 3. Table Data (Code Name AH TH)
            // Matches: [Code] [Name] [Num] [Num]
            const regex = /([A-Z0-9]{4,10})\s+(.+?)\s+(\d+)\s+(\d+)/g;
            let match, found = {};

            while ((match = regex.exec(text)) !== null) {
                const code = match[1];
                let name = match[2].trim().replace(/[^a-zA-Z0-9\s]/g, '');
                if(name.length > 25) name = name.substring(0,25)+"...";
                
                const n1 = parseInt(match[3]);
                const n2 = parseInt(match[4]);
                const th = Math.max(n1, n2);
                const ah = Math.min(n1, n2);

                if (th > 0 && name.length > 3) {
                    found[code] = { name, ah, th };
                }
            }

            if(Object.keys(found).length > 0) {
                appData.courses = found;
                save();
                showApp();
            } else {
                alert("Could not extract data. Ensure table format is readable.");
            }
            document.getElementById('loader').style.display = 'none';
        }

        function save() {
            localStorage.setItem('ocr_data_v1', JSON.stringify(appData));
        }

        // --- CORE FUNCTIONS ---
        function logAttendance(code, isPresent) {
            // Update Stats
            appData.courses[code].th++;
            if(isPresent) appData.courses[code].ah++;
            
            // Log History
            appData.history.unshift({
                date: new Date().getTime(),
                code: code,
                status: isPresent ? 'Present' : 'Absent',
                name: appData.courses[code].name
            });
            
            save();
            renderUI();
        }

        // --- RENDER ---
        function renderUI() {
            document.getElementById('disp-college').innerText = appData.profile.college || "COLLEGE NOT DETECTED";
            document.getElementById('disp-name').innerText = appData.profile.name;
            document.getElementById('disp-roll').innerText = appData.profile.roll;

            let tAh=0, tTh=0;
            Object.values(appData.courses).forEach(c => { tAh+=c.ah; tTh+=c.th; });
            document.getElementById('disp-global').innerText = tTh===0 ? "0%" : ((tAh/tTh)*100).toFixed(0)+"%";

            const container = document.getElementById('content-area');
            container.innerHTML = "";

            if(currentTab === 'consolidated') {
                renderConsolidated(container);
            } else {
                renderCards(container, currentTab === 'log');
            }
        }

        function renderConsolidated(container) {
            container.innerHTML = `
                <div class="filter-row">
                    <button class="filter-chip ${viewFilter==='daily'?'active':''}" onclick="setFilter('daily')">Daily</button>
                    <button class="filter-chip ${viewFilter==='weekly'?'active':''}" onclick="setFilter('weekly')">Weekly</button>
                    <button class="filter-chip ${viewFilter==='monthly'?'active':''}" onclick="setFilter('monthly')">Monthly</button>
                </div>
            `;

            if(appData.history.length === 0) {
                container.innerHTML += `<div style="text-align:center; color:var(--text-sub); margin-top:40px;">No logs recorded yet.<br>Go to Action tab to log attendance.</div>`;
                return;
            }

            // Grouping Logic
            let groups = {};
            appData.history.forEach(log => {
                const date = new Date(log.date);
                let key = "";
                if(viewFilter === 'daily') key = date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
                if(viewFilter === 'weekly') {
                     // Simple week key: Year-WeekNum
                     const firstDay = new Date(date.getFullYear(), 0, 1);
                     const pastDays = (date - firstDay) / 86400000;
                     const weekNum = Math.ceil((pastDays + firstDay.getDay() + 1) / 7);
                     key = `Week ${weekNum}, ${date.getFullYear()}`;
                }
                if(viewFilter === 'monthly') key = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

                if(!groups[key]) groups[key] = [];
                groups[key].push(log);
            });

            Object.keys(groups).forEach(key => {
                let html = `<div class="log-group"><div class="log-date">${key}</div><div class="card" style="padding:0; overflow:hidden;">`;
                groups[key].forEach(log => {
                    html += `
                        <div class="log-item">
                            <div>
                                <div style="font-weight:700; font-size:0.9rem;">${log.code}</div>
                                <div style="font-size:0.75rem; color:var(--text-sub);">${log.name}</div>
                            </div>
                            <div class="log-status ${log.status==='Present'?'s-p':'s-a'}">${log.status}</div>
                        </div>
                    `;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function renderCards(container, isAction) {
            const sorted = Object.entries(appData.courses).sort(([,a],[,b]) => (a.ah/a.th)-(b.ah/b.th));
            
            sorted.forEach(([code, c]) => {
                const pct = (c.ah/c.th)*100;
                const safe = pct >= 75;
                
                let footer = "";
                if(isAction) {
                    footer = `
                        <div class="action-row">
                            <button class="act-btn btn act-p" onclick="logAttendance('${code}', true)">Present</button>
                            <button class="act-btn btn act-a" onclick="logAttendance('${code}', false)">Absent</button>
                        </div>
                    `;
                } else {
                    // Insights
                    let rec = safe 
                        ? `<span style="color:var(--success); font-weight:700; font-size:0.8rem;">Safe: Can bunk ${Math.floor((c.ah-0.75*c.th)/0.75)}</span>`
                        : `<span style="color:var(--danger); font-weight:700; font-size:0.8rem;">Risk: Attend ${Math.ceil((0.75*c.th-c.ah)/0.25)}</span>`;
                    footer = `<div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center;"><span style="font-size:0.8rem; color:var(--text-sub);">${c.ah}/${c.th} Classes</span>${rec}</div>`;
                }

                container.innerHTML += `
                    <div class="card">
                        <div class="c-header">
                            <span class="c-code">${code}</span>
                            <span class="c-pct" style="color:${safe?'var(--success)':'var(--danger)'}">${pct.toFixed(0)}%</span>
                        </div>
                        <div class="c-name">${c.name}</div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width:${Math.min(pct,100)}%; background:${safe?'var(--success)':'var(--danger)'}"></div>
                        </div>
                        ${footer}
                    </div>
                `;
            });
            container.innerHTML += `<div style="text-align:center; padding:20px; color:var(--danger); text-decoration:underline; font-size:0.8rem;" onclick="reset()">Reset Data</div>`;
        }
    </script>
</body>
</html>
