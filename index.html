<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d1117">
    <title>Command | Aditya C.</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --danger: #da3633;
            --success: #238636;
            --text-main: #c9d1d9;
            --text-sub: #8b949e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 90px; /* Space for bottom content */
        }

        /* --- HEADER --- */
        .app-header {
            padding: 40px 24px 20px;
            background: linear-gradient(180deg, rgba(22,27,34,1) 0%, rgba(13,17,23,0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info h1 { margin: 0; font-size: 1.4rem; color: white; letter-spacing: -0.5px; }
        .user-info p { margin: 4px 0 0; font-size: 0.9rem; color: var(--text-sub); font-family: monospace; letter-spacing: 1px; }
        
        .global-badge {
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
        }

        /* --- LIVE WIDGET --- */
        .live-container {
            padding: 10px 24px 30px;
        }

        .live-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .pulsate {
            width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
            box-shadow: 0 0 0 rgba(88, 166, 255, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.7); } 
            70% { box-shadow: 0 0 0 10px rgba(88, 166, 255, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0); } 
        }

        .active-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.3);
        }

        .active-card:active { transform: scale(0.96); }

        .course-code { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; display: block; color: white; letter-spacing: -1px; }
        .course-name { font-size: 1rem; color: var(--text-sub); margin-bottom: 25px; display: block; font-weight: 500; }
        
        .status-indicator {
            font-size: 0.8rem;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 30px;
            background: rgba(255,255,255,0.06);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s;
        }

        /* STATE COLORS */
        .active-card.state-present {
            background: var(--success);
            border-color: rgba(255,255,255,0.2);
            color: white;
            box-shadow: 0 20px 40px -10px rgba(35, 134, 54, 0.5);
        }
        .active-card.state-present .course-name { color: rgba(255,255,255,0.9); }
        .active-card.state-present .status-indicator { background: rgba(0,0,0,0.2); }

        .active-card.state-absent {
            background: var(--danger);
            border-color: rgba(255,255,255,0.2);
            color: white;
            box-shadow: 0 20px 40px -10px rgba(218, 54, 51, 0.5);
        }
        .active-card.state-absent .course-name { color: rgba(255,255,255,0.9); }
        .active-card.state-absent .status-indicator { background: rgba(0,0,0,0.2); }

        /* --- GRID MENU --- */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 24px;
        }

        .menu-item {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.2s;
        }
        .menu-item:active { transform: scale(0.98); background: rgba(22,27,34,0.6); }
        .menu-item i { font-size: 1.6rem; margin-bottom: 12px; display: block; color: var(--text-main); }
        .menu-item span { font-size: 0.9rem; font-weight: 600; color: var(--text-sub); }

        /* --- VIEWS (Hidden by default) --- */
        .section-view { display: none; padding: 20px 24px; animation: fadeIn 0.3s ease; }
        .section-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .list-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-nav {
            padding: 10px 0 20px;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            font-size: 0.95rem;
        }

        /* --- RESET BUTTON --- */
        .reset-zone { text-align: center; margin-top: 50px; padding-bottom: 50px; }
        .btn-reset { 
            background: transparent; 
            border: 1px solid var(--danger); 
            color: var(--danger); 
            padding: 14px 28px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 0.9rem;
            width: 100%;
            opacity: 0.7;
        }
        .btn-reset:active { opacity: 1; background: rgba(218, 54, 51, 0.1); }

    </style>
</head>
<body>

    <div id="view-home" class="section-view active">
        <div class="app-header">
            <div class="user-info">
                <h1>Aditya Chalawadi</h1>
                <p>20221CBD0001</p>
            </div>
            <div class="global-badge" id="global-pct" style="color: var(--success)">--%</div>
        </div>

        <div class="live-container">
            <div class="live-label">
                <div class="pulsate"></div>
                <span id="time-display">LOADING...</span>
            </div>
            
            <div id="live-card-area">
                <div class="active-card" style="opacity: 0.5;">
                    <span class="course-code">--</span>
                    <span class="course-name">Searching Schedule...</span>
                </div>
            </div>
            <p style="text-align:center; font-size: 0.8rem; color: var(--text-sub); margin-top: 25px; opacity: 0.6;">
                Tap once for <span style="color:var(--success)">Present</span>, twice for <span style="color:var(--danger)">Absent</span>.
            </p>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="switchView('timetable')">
                <i class="fas fa-calendar-day" style="color: var(--accent)"></i>
                <span>Timetable</span>
            </div>
            <div class="menu-item" onclick="switchView('stats')">
                <i class="fas fa-chart-pie" style="color: var(--warning)"></i>
                <span>Analytics</span>
            </div>
        </div>
    </div>

    <div id="view-timetable" class="section-view">
        <div class="back-nav" onclick="switchView('home')">
            <i class="fas fa-arrow-left"></i> Dashboard
        </div>
        <h2 style="margin: 0 0 25px 0; font-size: 1.6rem; letter-spacing: -0.5px;">Weekly Schedule</h2>
        <div id="full-schedule-list"></div>
    </div>

    <div id="view-stats" class="section-view">
        <div class="back-nav" onclick="switchView('home')">
            <i class="fas fa-arrow-left"></i> Dashboard
        </div>
        <h2 style="margin: 0 0 25px 0; font-size: 1.6rem; letter-spacing: -0.5px;">Analytics</h2>
        <div id="stats-list"></div>
        
        <div class="reset-zone">
            <button class="btn-reset" onclick="factoryReset()">⚠️ Factory Reset Data</button>
        </div>
    </div>

    <script>
        // --- DATA CONFIGURATION ---
        const COURSES = {
            "APT4026": { name: "Aptitude", ah: 8, th: 14 },
            "CAI2500": { name: "Machine Learning (T)", ah: 4, th: 18 },
            "CAI2501": { name: "Machine Learning (L)", ah: 15, th: 25 },
            "CBD2510": { name: "No SQL (T)", ah: 4, th: 19 },
            "CBD2511": { name: "No SQL (L)", ah: 8, th: 14 },
            "CSE2258": { name: "Web Tech (T)", ah: 9, th: 19 },
            "CSE2259": { name: "Web Tech (L)", ah: 12, th: 14 },
            "CSE2274": { name: "Comp Programming", ah: 11, th: 24 },
            "CSE3426": { name: "Front-End Full Stack", ah: 11, th: 23 },
            "ECE3097": { name: "Smart Electronics", ah: 9, th: 19 },
            "LAW7601": { name: "Indian Constitution", ah: 2, th: 4 }
        };

        // SCHEDULE ARRAYS (Order of classes in the day)
        const SCHEDULE = {
            "Monday": ["CAI2500", "CBD2510", "CSE2274", "CSE2274", "CSE2258", "CSE3426", "ECE3097"],
            "Tuesday": ["CAI2500", "CSE2258", "CSE3426", "CBD2510", "CAI2500", "ECE3097"],
            "Wednesday": ["CSE2274", "CSE2274", "CAI2501", "CAI2501", "LAW7601", "CSE3426", "CSE3426"],
            "Thursday": ["CBD2510", "APT4026", "APT4026", "CAI2501", "CAI2501", "ECE3097"],
            "Friday": ["CBD2511", "CBD2511", "CSE2259", "CSE2259", "CSE2259", "CSE2259", "CSE2258"]
        };

        // TIME SLOTS (Mapping time to Array Index)
        // Note: 1:40 PM is usually the 5th period (Index 4)
        const TIME_SLOTS = [
            { start: "08:00", end: "09:20", index: 0 },
            { start: "09:20", end: "10:10", index: 1 },
            { start: "10:20", end: "11:10", index: 2 },
            { start: "11:10", end: "12:00", index: 3 },
            // Lunch Gap (12:00 - 13:30)
            { start: "13:30", end: "14:20", index: 4 }, // 1:40 PM triggers this
            { start: "14:20", end: "15:10", index: 5 },
            { start: "15:10", end: "16:00", index: 6 }
        ];

        // --- STORAGE & STATE ---
        let userData = JSON.parse(localStorage.getItem('aditya_db_final')) || COURSES;
        let sessionState = JSON.parse(localStorage.getItem('aditya_session_final')) || {};

        function save() {
            localStorage.setItem('aditya_db_final', JSON.stringify(userData));
            localStorage.setItem('aditya_session_final', JSON.stringify(sessionState));
            updateGlobal();
        }

        // --- CORE LOGIC ---
        function getDayName() {
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            return days[new Date().getDay()];
        }

        function timeStrToVal(str) {
            const [h, m] = str.split(':').map(Number);
            return h * 60 + m;
        }

        function getCurrentSlotIndex() {
            const now = new Date();
            const nowVal = now.getHours() * 60 + now.getMinutes();
            for (let slot of TIME_SLOTS) {
                if (nowVal >= timeStrToVal(slot.start) && nowVal < timeStrToVal(slot.end)) {
                    return slot.index;
                }
            }
            return -1;
        }

        // --- RENDERERS ---
        function updateLiveCard() {
            const day = getDayName();
            const slotIdx = getCurrentSlotIndex();
            const container = document.getElementById('live-card-area');
            const timeDisplay = document.getElementById('time-display');

            const now = new Date();
            timeDisplay.innerText = `${day.toUpperCase()} | ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;

            // Check if schedule exists for today and slot is valid
            if (SCHEDULE[day] && slotIdx !== -1 && slotIdx < SCHEDULE[day].length) {
                const courseCode = SCHEDULE[day][slotIdx];
                if (courseCode) {
                    const uniqueKey = `${day}-${slotIdx}`;
                    const currentState = sessionState[uniqueKey] || 0; 
                    const courseName = userData[courseCode].name;

                    let stateClass = "";
                    let statusText = "Tap to Mark";
                    let icon = '<i class="fas fa-fingerprint"></i>';
                    
                    if(currentState === 1) { 
                        stateClass = "state-present"; 
                        statusText = "Present"; 
                        icon = '<i class="fas fa-check"></i>';
                    }
                    if(currentState === 2) { 
                        stateClass = "state-absent"; 
                        statusText = "Absent"; 
                        icon = '<i class="fas fa-times"></i>';
                    }

                    container.innerHTML = `
                        <div class="active-card ${stateClass}" onclick="toggleAttendance('${courseCode}', '${uniqueKey}')">
                            <span class="course-code">${courseCode}</span>
                            <span class="course-name">${courseName}</span>
                            <div class="status-indicator">${icon} ${statusText}</div>
                        </div>
                    `;
                    return;
                }
            }

            // Fallback: No Class
            container.innerHTML = `
                <div class="active-card" style="border: 2px dashed var(--border); background: transparent; opacity: 0.6;">
                    <span class="course-code" style="font-size:1.5rem; color:var(--text-sub);">FREE</span>
                    <span class="course-name" style="margin-bottom:0">No Class Detected</span>
                </div>
            `;
        }

        function toggleAttendance(code, key) {
            let cur = sessionState[key] || 0;
            let next = (cur + 1) % 3; // 0->1->2->0

            // Undo previous stats
            if (cur === 1) { userData[code].ah--; userData[code].th--; }
            if (cur === 2) { userData[code].th--; }

            // Apply new stats
            if (next === 1) { userData[code].ah++; userData[code].th++; }
            if (next === 2) { userData[code].th++; }

            sessionState[key] = next;
            save();
            updateLiveCard();
            renderStats();
        }

        function updateGlobal() {
            let ah = 0, th = 0;
            Object.values(userData).forEach(c => { ah += c.ah; th += c.th; });
            const pct = th === 0 ? 0 : (ah/th)*100;
            const el = document.getElementById('global-pct');
            el.innerText = pct.toFixed(1) + "%";
            el.style.color = pct >= 75 ? "var(--success)" : "var(--danger)";
            el.style.borderColor = pct >= 75 ? "var(--success)" : "var(--danger)";
        }

        function renderStats() {
            const div = document.getElementById('stats-list');
            div.innerHTML = "";
            const sorted = Object.entries(userData).sort(([,a], [,b]) => (a.ah/a.th) - (b.ah/b.th));

            sorted.forEach(([code, data]) => {
                const pct = (data.ah / data.th) * 100;
                div.innerHTML += `
                    <div class="list-card">
                        <div>
                            <div style="font-weight:700; color:white;">${code}</div>
                            <div style="font-size:0.8rem; opacity:0.6;">${data.name}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:800; font-size:1.1rem; color:${pct<75?'var(--danger)':'var(--success)'}">${pct.toFixed(0)}%</div>
                            <div style="font-size:0.75rem; opacity:0.5;">${data.ah}/${data.th}</div>
                        </div>
                    </div>
                `;
            });
        }

        function renderTimetable() {
            const div = document.getElementById('full-schedule-list');
            div.innerHTML = "";
            const today = getDayName();
            
            Object.keys(SCHEDULE).forEach(day => {
                const isToday = (day === today);
                div.innerHTML += `<div style="margin-top:25px; color:${isToday ? 'var(--accent)' : 'var(--text-sub)'}; font-weight:800; font-size:0.85rem; letter-spacing:1px; text-transform:uppercase; border-bottom: 1px solid var(--border); padding-bottom:5px; margin-bottom:10px;">${day}</div>`;
                
                SCHEDULE[day].forEach((code, idx) => {
                    // Find start time
                    const slot = TIME_SLOTS.find(t => t.index === idx);
                    const time = slot ? slot.start : `Slot ${idx+1}`;
                    
                    div.innerHTML += `
                        <div class="list-card" style="padding:12px; margin-bottom:6px; background: rgba(255,255,255,0.03);">
                            <div style="display:flex; align-items:center; gap:15px;">
                                <span style="font-size:0.75rem; opacity:0.5; width:40px;">${time}</span>
                                <span style="font-size:0.9rem; font-weight:bold;">${code}</span>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function switchView(id) {
            document.querySelectorAll('.section-view').forEach(e => e.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        function factoryReset() {
            if(confirm("Confirm Reset? All attendance data will be lost.")) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- INIT ---
        setInterval(updateLiveCard, 15000); // Update every 15s
        updateLiveCard();
        updateGlobal();
        renderStats();
        renderTimetable();

    </script>
</body>
</html>
